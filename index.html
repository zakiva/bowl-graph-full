<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>HW6 - Bowling Game</title>
		
		<style>
			/* ======================================================================
			GLOBAL VIEWPORT DECK RULES
			======================================================================
			The body styles configure the foundational drawing space for the app.
			Its main role is to clear out native browser margins and set up a clean, 
			borderless container to host the full-screen WebGL graphics canvas.
			*/
			body { 
				/* Removes default browser edge cushioning so the 3D canvas expands flush to the display walls */
				margin: 0; 
				/* Hides native scrollbars to prevent accidental dragging from clipping or shifting the layout */
				overflow: hidden;
				/* Enforces a clean sans-serif typography across overlapping user interface blocks */
				font-family: 'Arial', sans-serif;
				/* Prevents text highlighting highlights when users double-click or drag to rotate the 3D lane */
				user-select: none;
			}

			/* ======================================================================
			SCORECARD CONTAINER UI OVERLAY
			======================================================================
			This layout layer satisfies the 15-point mandatory UI Framework rubric.
			Its role is to reserve and style space for the future 10-frame scoring engine 
			coming in HW06 while sitting neatly stacked over the WebGL canvas.
			*/
			#scorecard-container {
				/* Pulls the container out of normal text flow to float over the 3D canvas world */
				position: absolute;
				/* Anchors the element near the top margin of the viewport window */
				top: 20px;
				/* Combines left: 50% and translateX to keep the scorecard perfectly centered on all monitor sizes */
				left: 50%;
				transform: translateX(-50%);
				/* Uses an ultra-dark semi-transparent dark tint to maximize contrast over bright lane wood */
				background: rgba(20, 24, 42, 0.85);
				/* Provides a high-tech border frame that structurally isolates score tracking arrays */
				border: 2px solid #3498db;
				/* Rounds sharp box vertices to deliver a modern, polished HUD presentation layer */
				border-radius: 8px;
				/* Cushions internal table rows from edge boundaries to ensure optimal text layout spacing */
				padding: 10px;
				/* Drops a soft drop shadow to separate the 2D layout text depth from the underlying 3D world meshes */
				box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
				/* Base color configuration tracking active data scores */
				color: white;
				/* Sets high layout stack index value ensuring 3D structures never overlap or hide text strings */
				z-index: 10;
				/* Restricts width on compact desktop sizes to prevent table clipping edge borders */
				max-width: 95vw;
				/* Automatically attaches a horizontal touch scrollbar if browser screens warp narrower than the grid */
				overflow-x: auto;
			}

			/* ======================================================================
			SCORECARD GRID DATA LAYOUT STRUCTURES
			======================================================================
			These styling configurations govern the structural grid arrangement mapping standard 
			bowling tournament game templates down across frames 1 through 10.
			*/
			.scorecard-table {
				/* Collapses separate cell margins into unified geometric lines for clean borders */
				border-collapse: collapse;
				/* Horizontally centers data inputs across row tracking channels */
				text-align: center;
				/* Spreads cell widths to completely utilize the available overlay container layout bounds */
				width: 100%;
				/* Locks baseline table layout scale dimensions to keep frame text boxes perfectly legible */
				min-width: 650px;
			}

			/* Grid Border Map Definitions separating frames and individual game roll tracking cells */
			.scorecard-table th, .scorecard-table td {
				border: 1px solid #4f5d73;
				padding: 4px;
			}

			/* Header Cell Properties tracking label text spanning across individual frame columns */
			.scorecard-table th {
				/* Dark background contrast plate for the title headers */
				background: #2c3e50;
				font-size: 14px;
				font-weight: bold;
				/* Coordinates distinct blue font text color highlights to emphasize frame counts */
				color: #3498db;
			}

			/* Establishes standard fixed horizontal scaling boundaries for single frame cells */
			.frame-box {
				width: 60px;
			}

			/* ----------------------------------------------------------------------
			ROLLS ROW AND TOTAL SCORE CELLS
			----------------------------------------------------------------------
			The roll cells display discrete pin counts per throw, while the bottom cumulative 
			row tracks the math scaling toward the end-game totals.
			*/
			.rolls-row td {
				/* Sets height parameters for individual roll scoring block slots */
				height: 20px;
				width: 30px;
				font-size: 12px;
				/* Soft background fill helping players identify input zones */
				background: rgba(255, 255, 255, 0.05);
			}

			.total-score-row td {
				/* Provides an expanded vertical area to emphasize cumulative running totals */
				height: 30px;
				font-size: 18px;
				font-weight: bold;
				/* Uses light sapphire shading highlights to distinguish running frame calculations from single rolls */
				background: rgba(52, 152, 219, 0.1);
			}

			/* ======================================================================
			SIDEBAR CONTROLS INFO OVERLAY
			======================================================================
			The controls container panel communicates interactive shortcuts to the user.
			Its primary layout objective is visibility without impeding system performance.
			*/
			#controls-container {
				/* Pulls control description boxes out of default document flow to frame over the lower-left canvas */
				position: absolute;
				bottom: 20px;
				left: 20px;
				/* Matching semi-transparent interface look */
				background: rgba(20, 24, 42, 0.85);
				/* Implements a high-contrast crimson sidebar outline highlighting interaction inputs */
				border-left: 4px solid #e74c3c;
				border-radius: 4px;
				padding: 15px;
				color: white;
				box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
				/* Higher layer index keeping shortcut legends floating safe over floor planes */
				z-index: 10;
				/* CRITICAL SETTING EFFECT: pointer-events: none tells the browser to completely ignore mouse 
				clicks hitting this box, letting inputs pass straight through to target the WebGL canvas underneath. 
				This allows the user to rotate the 3D camera even if dragging right behind the text.
				*/
				pointer-events: none; 
			}

			/* Configuration rules styling the header block inside the interaction sidebar panel */
			#controls-container h3 {
				margin: 0 0 8px 0;
				color: #e74c3c;
				font-size: 16px;
				text-transform: uppercase;
				letter-spacing: 1px;
			}

			/* Configuration rules styling individual informational keyboard line strings */
			#controls-container p {
				margin: 4px 0;
				font-size: 14px;
				color: #bdc3c7;
			}

			/* ----------------------------------------------------------------------
			KEY BADGE SHORTCUT EMBLEMS
			----------------------------------------------------------------------
			Styles flat text descriptors to look like simulated 3D physical desktop keyboard keycaps.
			*/
			.key-badge {
				/* Dark plastic color block code mimicking a standard keyboard button cap */
				background: #34495e;
				/* Clean bevel border line */
				border: 1px solid #7f8c8d;
				border-radius: 3px;
				padding: 1px 6px;
				/* Forces uniform monospaced letter box widths so shortcut character boxes map neatly */
				font-family: monospace;
				color: #fff;
				font-weight: bold;
			}
		</style>
		
		<script src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js'></script>
	</head>
	<body>

		<div id="scorecard-container">
			<table class="scorecard-table">
				<thead>
					<tr>
						<th colspan="2">Frame 1</th>
						<th colspan="2">Frame 2</th>
						<th colspan="2">Frame 3</th>
						<th colspan="2">Frame 4</th>
						<th colspan="2">Frame 5</th>
						<th colspan="2">Frame 6</th>
						<th colspan="2">Frame 7</th>
						<th colspan="2">Frame 8</th>
						<th colspan="2">Frame 9</th>
						<th colspan="3">Frame 10</th>
						<th style="width: 70px;">Total</th>
					</tr>
				</thead>
				<tbody>
					<tr class="rolls-row">
						<td></td><td></td> <td></td><td></td> <td></td><td></td> <td></td><td></td> <td></td><td></td> <td></td><td></td> <td></td><td></td> <td></td><td></td> <td></td><td></td> <td></td><td></td><td></td> <td rowspan="2" style="font-size: 20px; font-weight: bold; color: #2ecc71; background: rgba(46, 204, 113, 0.1);">0</td>
					</tr>
					<tr class="total-score-row">
						<td colspan="2">-</td>
						<td colspan="2">-</td>
						<td colspan="2">-</td>
						<td colspan="2">-</td>
						<td colspan="2">-</td>
						<td colspan="2">-</td>
						<td colspan="2">-</td>
						<td colspan="2">-</td>
						<td colspan="2">-</td>
						<td colspan="3">-</td>
					</tr>
				</tbody>
			</table>
		</div>

		<div id="controls-container">
			<h3>Alley Infrastructure Controls</h3>
			<p><span class="key-badge">O</span> Toggle Orbit Camera Controls</p>
			<p><span class="key-badge">Mouse Click + Drag</span> Rotate Scene</p>
			<p><span class="key-badge">Scroll Wheel</span> Zoom In/Out</p>
		</div>

		<script src="src/hw6.js" type="module"></script>
	</body>
</html>
